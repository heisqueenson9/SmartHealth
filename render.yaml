services:
  - type: web
    name: smarthealth-ai-eduafo
    env: python
    buildCommand: pip install -r requirements.txt && python src/train_models.py
    startCommand: gunicorn app.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
